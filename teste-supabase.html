<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Supabase</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f0f0f0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #00101F;
    }
    .status {
      padding: 15px;
      border-radius: 6px;
      margin: 20px 0;
      font-weight: bold;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .loading {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    pre {
      background: #f4f4f4;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Teste de Conexão Supabase</h1>
    
    <div id="status" class="status loading">
      ⏳ Testando conexão...
    </div>

    <div id="result"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.0/+esm';

    const SUPABASE_URL = 'https://updqzeidruylrupzetai.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Ae5EYlmGzoPXw4SyAiavDQ_OhquU5z4';

    async function testConnection() {
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('result');

      try {
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        statusEl.innerHTML = '📡 Cliente Supabase criado. Buscando tabela de produtos...';

        const candidateTables = ['products', 'produtos', 'produto', 'produto_simac', 'tbl_produtos', 'produtos_simac'];
        let selectedTable = null;
        let selectedData = null;

        for (const table of candidateTables) {
          const { data, error } = await supabase
            .from(table)
            .select('*')
            .limit(5);

          if (!error && data) {
            selectedTable = table;
            selectedData = data;
            break;
          }
        }

        if (!selectedTable) {
          statusEl.className = 'status error';
          statusEl.innerHTML = '❌ Não encontrou tabela entre nomes conhecidos.';
          resultEl.innerHTML = `<p>Tente criar ou informar o nome da tabela no script.</p><pre>${JSON.stringify(candidateTables, null, 2)}</pre>`;
          return;
        }

        statusEl.className = 'status success';
        statusEl.innerHTML = `✅ Tabela encontrada: ${selectedTable}. ${selectedData.length} produtos carregados.`;
        resultEl.innerHTML = `<pre>${JSON.stringify(selectedData, null, 2)}</pre>`;
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.innerHTML = `❌ Erro: ${err.message}`;
        resultEl.innerHTML = `<pre>${err.stack}</pre>`;
      }
    }

    testConnection();
  </script>
</body>
</html>
